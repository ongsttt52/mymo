server:
  port: 8080

spring:
  application:
    name: mymo-api
  profiles:
    active: dev

  # JPA 공통 설정
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
    open-in-view: false

  # Java 21 가상 스레드 활성화
  threads:
    virtual:
      enabled: false

# JWT 설정
jwt:
  secret: mymo-jwt-secret-key-for-development-only-must-be-at-least-256-bits-long
  expiration: 86400000 # 24시간 (밀리초)
