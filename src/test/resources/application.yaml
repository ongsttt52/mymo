spring:
  datasource:
    url: jdbc:h2:mem:mymo-db-test
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: mymo-jwt-secret-key-for-development-only-must-be-at-least-256-bits-long
  expiration: 86400000
